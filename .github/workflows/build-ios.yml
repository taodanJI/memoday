name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build App
        run: |
          set -e

          # === Step 1: Create app bundle structure ===
          APP_NAME="Memoday"
          APP_BUNDLE="${APP_NAME}.app"
          mkdir -p "${APP_BUNDLE}"
          
          # Copy Info.plist
          cp ios-app/MemodayApp/Info.plist "${APP_BUNDLE}/"
          
          # === Step 2: Compile Swift code ===
          # Use swiftc to compile AppDelegate.swift into a binary
          echo "=== Compiling Swift source ==="
          swiftc \
            -sdk iphoneos \
            -target arm64-apple-ios14.0 \
            -parse-as-library \
            ios-app/MemodayApp/AppDelegate.swift \
            -o "${APP_BUNDLE}/${APP_NAME}" 2>&1 | tee swift-build.log || {
            echo "=== SWIFTC BUILD FAILED ==="
            cat swift-build.log
            exit 2
          }
          
          # Make binary executable
          chmod +x "${APP_BUNDLE}/${APP_NAME}"
          
          # Verify binary
          file "${APP_BUNDLE}/${APP_NAME}"
          ls -la "${APP_BUNDLE}/"
          
          # === Step 3: Copy web assets ===
          cp ios-app/MemodayApp/index.html "${APP_BUNDLE}/"
          cp ios-app/MemodayApp/style.css "${APP_BUNDLE}/"
          cp ios-app/MemodayApp/sw.js "${APP_BUNDLE}/"
          cp ios-app/MemodayApp/icon.svg "${APP_BUNDLE}/"
          cp ios-app/MemodayApp/manifest.json "${APP_BUNDLE}/"
          [ -d ios-app/MemodayApp/js ] && cp -r ios-app/MemodayApp/js "${APP_BUNDLE}/" || true
          [ -d ios-app/MemodayApp/icons ] && cp -r ios-app/MemodayApp/icons "${APP_BUNDLE}/" || true

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r Memoday.app Payload/
          zip -r Memoday.ipa Payload
          echo "IPA created:"
          ls -lh Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
