name: Build iOS IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    name: Build iOS Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: |
          rm -rf node_modules
          npm install --ignore-scripts

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Prepare www directory
        run: |
          mkdir -p www/icons www/js
          cp index.html www/
          cp style.css www/
          cp manifest.json www/
          cp sw.js www/
          cp icon.svg www/
          cp -r js/* www/js/
          [ -d icons ] && cp -r icons/* www/icons/ || true
          echo "www/ ready"
          ls www/

      - name: Add iOS platform
        run: |
          rm -rf ios
          npx cap add ios
          ls ios/App/

      - name: Sync web assets
        run: npx cap sync ios

      - name: Copy Podfile from template
        run: |
          cp Podfile.template ios/App/Podfile
          echo "Podfile copied:"
          cat ios/App/Podfile | head -15

      - name: Install pods
        run: cd ios/App && pod install --repo-update 2>&1 | tail -15

      - name: Build (no signing)
        run: cd ios/App && \
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tail -40

      - name: Package IPA
        run: |
          APP_PATH=$(find ios/build/DerivedData -name "App.app" 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Searching for any .app ..."
            find ios/build -name "*.app" 2>/dev/null || find ios -name "App.app" 2>/dev/null || echo "No app found!"
          fi
          
          echo "Using: $APP_PATH"
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Memoday.ipa Payload/
          ls -lh Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
          if-no-files-found: warn
