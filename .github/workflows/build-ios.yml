name: Build iOS IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    name: Build iOS Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: |
          rm -rf node_modules
          npm install --ignore-scripts

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Prepare www directory
        run: |
          mkdir -p www/icons www/js
          cp index.html style.css manifest.json sw.js icon.svg www/
          cp -r js/* www/js/
          [ -d icons ] && cp -r icons/* www/icons/ || true

      - name: Add iOS platform
        run: |
          rm -rf ios
          npx cap add ios

      - name: Sync web assets
        run: npx cap sync ios

      - name: Copy Podfile from template
        run: cp Podfile.template ios/App/Podfile

      - name: Install pods
        run: cd ios/App && pod install --repo-update 2>&1 | tail -10

      - name: Build for Device (unsigned)
        run: |
          cd ios/App
          
          # 先列出 schemes 确认项目正常
          xcodebuild -workspace App.xcworkspace -list 2>&1 | head -20
          
          # 构建设备版（不签名）
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/DD \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO \
            build 2>&1 | tee ../build_log.txt | tail -50
          
          echo "=== Build exit code: $? ==="
          echo "=== Searching for .app ==="
          find ../build -name "*.app" 2>/dev/null | head -10
          echo "=== Searching for .app in entire ios/ ==="
          find .. -name "*.app" -not -path "*Pods*" 2>/dev/null | head -10
          echo "=== DD directory contents ==="
          ls ../build/DD/Build/Products/ 2>/dev/null || echo "No Products dir"

      - name: Package IPA
        run: |
          # 多种路径尝试找 .app
          APP_PATH=""
          for pattern in \
            "ios/build/DD/Build/Products/Release-iphoneos/App.app" \
            "ios/build/DD/Build/Release-iphoneos/App.app" \
            "ios/build/DD/Build/Products/*/App.app"; do
            if [ -f "$pattern"/Info.plist ]; then
              APP_PATH="$pattern"
              echo "Found app at: $APP_PATH"
              break
            fi
          done
          
          # 如果上面没找到，用 find 搜
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ios/build -name "App.app" -not -path "*dSYM*" 2>/dev/null | head -1)
            echo "find result: $APP_PATH"
          fi
          
          # 还没有，扩大搜索
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "App.app" -not -path "*node_modules*" -not -path "*Pods*" 2>/dev/null | head -1)
            echo "wide search result: $APP_PATH"
          fi
          
          if [ -n "$APP_PATH" ] && [ -f "$APP_PATH/Info.plist" ]; then
            echo "Packaging IPA from: $APP_PATH"
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r Memoday.ipa Payload/
            ls -lh Memoday.ipa
          else
            echo "ERROR: No App.app found anywhere!"
            find . -name "*.app" -not -path "*Pods*" 2>/dev/null || true
            echo "=== Build log (last 30 lines) ==="
            tail -30 ios/build_log.txt 2>/dev/null || echo "No log file"
            
            # 尝试从 xcarchive 找
            XCA=$(find . -name "*.xcarchive" 2>/dev/null | head -1)
            if [ -n "$XCA" ]; then
              echo "Found archive: $XCA"
              APP_FROM_XCA="$XCA/Products/Applications/App.app"
              if [ -f "$APP_FROM_XCA/Info.plist" ]; then
                mkdir -p Payload
                cp -R "$APP_FROM_XCA" Payload/
                zip -r Memoday.ipa Payload/
                ls -lh Memoday.ipa
                exit 0
              fi
            fi
            
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
          if-no-files-found: warn
