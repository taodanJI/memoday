name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen 2>/dev/null || true

      - name: Generate & Build
        run: |
          cd ios-app
          xcodegen generate
          xcodebuild \
            -project Memoday.xcodeproj \
            -scheme Memoday \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build 2>&1 | tee log.txt | tail -40
          echo "EXIT: $?"
          find build -name "Memoday.app" | head -3

      - name: Package IPA
        run: |
          cd ios-app
          APP=$(find build -name "Memoday.app" -not -path "*dSYM*" | head -1)
          if [ ! "$APP" ]; then echo "FAIL"; tail -30 log.txt; exit 1; fi
          rm -rf Payload; mkdir Payload; cp -R "$APP" Payload/
          zip -rq ../Memoday.ipa Payload/
          ls -lh ../Memoday.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
