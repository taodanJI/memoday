name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          cd ios-project
          set +e
          xcodebuild \
            -project Memoday.xcodeproj \
            -scheme Memoday \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            TARGETED_DEVICE_FAMILY="1" \
            clean build 2>&1 | tee ../build.log
          
          echo ""
          echo "=========================================="
          echo "=== Searching ALL directories for .app ==="
          find . -name "*.app" -type d 2>/dev/null | head -10
          echo ""
          echo "=== Listing build/Build/Products contents ==="
          find build/Build/Products -maxdepth 3 -type d 2>/dev/null | head -20
          echo ""

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Package IPA
        run: |
          # Search broadly for any .app bundle
          APP_PATH=$(find ios-project -name "*.app" -type d 2>/dev/null | grep -i memoday | head -1)
          
          if [ -z "$APP_PATH" ]; then
            # Try even broader
            APP_PATH=$(find . -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found anywhere!"
            echo "Contents of ios-project/:"
            ls -laR ios-project/build 2>/dev/null | head -60
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH/" 2>/dev/null || true
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Memoday.app
          zip -ry Memoday.ipa Payload
          rm -rf Payload
          echo ""
          echo "IPA size:"
          ls -lh Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
