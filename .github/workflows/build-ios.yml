name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List project contents
        run: |
          echo "=== ios-project/ ==="
          ls -la ios-project/
          echo ""
          echo "=== ios-project/MemodayApp/ ==="
          ls -la ios-project/MemodayApp/
          echo ""
          echo "=== ios-project/Memoday.xcodeproj/ ==="
          ls -la ios-project/Memoday.xcodeproj/

      - name: Validate project
        run: |
          cd ios-project
          echo "=== Listing schemes ==="
          xcodebuild -project Memoday.xcodeproj -list 2>&1 || echo "xcodebuild -list failed"
          echo ""
          echo "=== Listing targets ==="
          xcodebuild -project Memoday.xcodeproj -list -json 2>&1 | head -30 || true

      - name: Build
        run: |
          cd ios-project
          
          xcodebuild \
            -project Memoday.xcodeproj \
            -scheme Memoday \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            TARGETED_DEVICE_FAMILY="1" \
            clean build 2>&1 | tee ../build.log
          
          BUILD_EXIT=$?
          echo ""
          echo "=========================================="
          echo "XCODEBUILD EXIT CODE: $BUILD_EXIT"
          echo "=========================================="
          
          echo ""
          echo "=== Searching for .app bundles ==="
          find . -name "*.app" -type d 2>/dev/null | head -10
          
          echo ""
          echo "=== Contents of derivedData Products ==="
          ls -laR build/Build/Products 2>/dev/null | head -60 || echo "(directory not found)"

          exit $BUILD_EXIT

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Package IPA
        run: |
          # Search broadly for any .app bundle  
          APP_PATH=$(find . -name "*.app" -type d 2>/dev/null | grep -i memo | head -1)
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            echo "--- Full directory listing ---"
            find . -maxdepth 6 -type d 2>/dev/null | grep -v ".git\|node_modules" | head -40
            exit 1
          fi
          
          echo "APP_PATH=$APP_PATH"
          ls -la "$APP_PATH/" 2>/dev/null || true
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Memoday.app
          zip -ry Memoday.ipa Payload
          rm -rf Payload
          echo ""
          ls -lh Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
