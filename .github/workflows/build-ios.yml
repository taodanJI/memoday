name: Build iOS IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    name: Build iOS Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: |
          rm -rf node_modules
          npm install --ignore-scripts

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Create www directory and copy assets
        run: |
          mkdir -p www/icons www/js
          cp index.html www/
          cp style.css www/
          cp manifest.json www/
          cp sw.js www/
          cp icon.svg www/
          cp -r js/* www/js/
          [ -d icons ] && cp -r icons/* www/icons/ || true
          [ -f install-guide.html ] && cp install-guide.html www/ || true
          echo "www/ contents:"
          ls www/

      - name: Add iOS platform (force recreate)
        run: |
          rm -rf ios
          npx cap add ios
          echo "ios/ exists?"
          ls ios/ | head -20
          echo "App dir?"
          ls ios/App/ 2>/dev/null || echo "No App dir"

      - name: Sync web assets to iOS
        run: npx cap sync ios 2>&1 || echo "Sync had warnings, continuing..."

      - name: Check for Podfile and fix
        run: |
          if [ ! -f ios/App/Podfile ]; then
            echo "⚠️ No Podfile found, creating one..."
            cat > ios/App/Podfile <<'PODFILE'
            # Uncomment the next line to define a global platform for your project
            # platform :ios, '13.0'
            
            target 'App' do
              use_frameworks!
            
              pod 'Capacitor', :path => '../node_modules/@capacitor/ios'
              pod 'CapacitorCordova', :path => '../node_modules/@capacitor/ios'
            end
            
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                end
              end
            end
            PODFILE
            echo "Podfile created"
          fi
          cat ios/App/Podfile | head -15

      - name: Install pods
        run: cd ios/App && pod install --repo-update 2>&1 | tail -10

      - name: Create self-signed certificate for ad-hoc build
        run: |
          security create-keychain -p "temp123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp123" build.keychain
          
          openssl genrsa -out /tmp/key.pem 2048
          openssl req -new -key /tmp/key.pem -out /tmp/csr.csr -subj "/CN=Memoday/CN=US"
          openssl x509 -req -days 365 -in /tmp/csr.csr -signkey /tmp/key.pem -out /tmp/cert.pem
          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/key.pem -in /tmp/cert.pem -passout pass:temp123
          
          security import /tmp/cert.p2 -k build.keychain -P temp123 -A 2>/dev/null || true

      - name: Build Archive
        run: |
          cd ios/App
          
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ../build/App.xcarchive \
            CODE_SIGN_IDENTITY="Apple Development" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            archive 2>&1 | tail -40
          
          echo "=== Checking archive ==="
          find ../build -type f 2>/dev/null | head -20 || echo "No build output"
          find . -name "*.xcarchive" -o -name "*.app" 2>/dev/null | head -5 || echo "No archives found"

      - name: Export IPA
        run: |
          mkdir -p ios/build/ipa/Payload
          
          APP_PATH=$(find ios/build -name "*.app" -not -path "*dSYM*" 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Trying alternate paths..."
            APP_PATH=$(find ios -name "App.app" -not -path "*DerivedData*" 2>/dev/null | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "No app found, trying to build with xcodebuild directly to ipa..."
            cd ios/App
            xcodebuild \
              -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath build/DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              ONLY_ACTIVE_ARCH=NO \
              build 2>&1 | tail -30
            
            APP_PATH=$(find build/DerivedData -name "App.app" 2>/dev/null | head -1)
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            cp -r "$APP_PATH" ios/build/ipa/Payload/
            cd ios/build/ipa && zip -r ../../Memoday.ipa Payload/
            cd ../../..
            ls -la Memoday.ipa
          else
            echo "ERROR: Could not find built .app file"
            find ios -name "*.app" -not -path "*DerivedData*" 2>/dev/null || echo "No apps anywhere"
            exit 1
          fi

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
          if-no-files-found: warn
