name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        working-directory: ios-project
        run: |
          set +e
          xcodebuild \
            -project Memoday.xcodeproj \
            -scheme Memoday \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            TARGETED_DEVICE_FAMILY="1" \
            OTHER_SWIFT_FLAGS="-parse-as-library" \
            clean build 2>&1 | tee build.log
          echo ""
          echo "=========================================="
          echo "EXIT CODE: $?"
          echo "=========================================="
          echo ""
          echo "=== Searching for .app bundles ==="
          find build -name "*.app" -type d 2>/dev/null | while read f; do
            echo "--- Found: $f ---"
            ls -la "$f/" 2>/dev/null || echo "(empty)"
            echo "--- Checking for executables ---"
            file "$f/Memoday" 2>/dev/null || echo "No 'Memoday' binary"
            file "$f/"* 2>/dev/null || echo "No files at all"
            # Also show recursive listing
            find "$f" -type f 2>/dev/null | head -30
          done

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios-project/build.log
          retention-days: 7

      - name: Package IPA
        run: |
          APP_PATH=$(find ios-project/build -name "Memoday.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            exit 1
          fi
          
          echo "APP PATH: $APP_PATH"
          echo "=== Contents ==="
          ls -laR "$APP_PATH/" 2>&1 | head -40
          
          # Check binary exists
          if [ ! -f "$APP_PATH/Memoday" ]; then
            echo "WARNING: No Memoday binary! Looking for alternatives..."
            find "$APP_PATH" -type f -perm +111 2>/dev/null | head -5
            # Try finding any Mach-O binary
            find "$APP_PATH" -type f -exec sh -c 'file "$1" | grep -q Mach' _ {} \; -print 2>/dev/null | head -5
          fi
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ry Memoday.ipa Payload
          echo ""
          echo "=== IPA created ==="
          ls -lh Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
