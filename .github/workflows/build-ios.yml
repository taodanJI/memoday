name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode info
        run: |
          echo "=== Xcode version ==="
          xcodebuild -version
          echo "=== SDKs available ==="
          xcodebuild -showsdks
          echo "=== Project file ==="
          ls -la ios-project/Memoday.xcodeproj/
          head -5 ios-project/Memoday.xcodeproj/project.pbxproj

      - name: Build
        working-directory: ios-project
        run: |
          set +e
          xcodebuild \
            -project Memoday.xcodeproj \
            -scheme Memoday \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            TARGETED_DEVICE_FAMILY="1" \
            clean build 2>&1 | tee build.log
          echo "=== EXIT CODE: $? ==="
          echo "=== Looking for .app ==="
          find build -name "Memoday.app" -type d 2>/dev/null | while read f; do
            echo "FOUND: $f"
            ls -la "$f/" | head -15
          done

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios-project/build.log
          retention-days: 7

      - name: Package IPA
        run: |
          APP_PATH=$(find ios-project/build -name "Memoday.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found"
            find ios-project/build -type d 2>/dev/null | head -20
            exit 1
          fi
          echo "Using: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Memoday.ipa Payload
          echo "IPA OK:"
          ls -lh Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
