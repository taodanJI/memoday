name: Build iOS IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    name: Build iOS Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: |
          rm -rf node_modules
          npm install --ignore-scripts

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Prepare www directory
        run: |
          mkdir -p www/icons www/js
          cp index.html style.css manifest.json sw.js icon.svg www/
          cp -r js/* www/js/
          [ -d icons ] && cp -r icons/* www/icons/ || true

      - name: Add iOS platform
        run: |
          rm -rf ios
          npx cap add ios
          echo "=== ios/App contents ==="
          ls -la ios/App/

      - name: Sync web assets
        run: npx cap sync ios

      - name: Copy Podfile from template
        run: cp Podfile.template ios/App/Podfile && cat ios/App/Podfile | head -10

      - name: Install pods (with verbose)
        run: cd ios/App && pod install --repo-update --verbose 2>&1 | tail -20

      - name: Check what Xcode files exist
        run: |
          echo "=== .xcworkspace? ==="
          find ios -name "*.xcworkspace" 2>/dev/null || echo "No xcworkspace"
          echo "=== .xcodeproj? ==="
          find ios -name "*.xcodeproj" 2>/dev/null || echo "No xcodeproj"
          echo "=== App directory ==="
          ls ios/App/*.xcworkspace ios/App/*.xcodeproj 2>/dev/null || echo "None found in App/"
          echo "=== Podfile.lock? ==="
          [ -f ios/App/Podfile.lock ] && echo "Yes" || echo "No"

      - name: Build for Device (unsigned) - xcodeproj mode
        run: |
          cd ios/App
          
          # 确定用哪个文件构建
          BUILD_FILE=""
          if [ -f "App.xcworkspace" ]; then
            BUILD_FILE="App.xcworkspace"
            BUILD_TYPE="-workspace"
            echo "Using workspace"
          elif [ -f "App.xcodeproj" ]; then
            BUILD_FILE="App.xcodeproj"
            BUILD_TYPE="-project"
            echo "Using project"
          else
            echo "ERROR: No Xcode project file found!"
            ls *.xcworkspace *.xcodeproj 2>&1 || true
            exit 1
          fi
          
          # 列出 schemes（确认 scheme 名字）
          echo "=== Available schemes ==="
          xcodebuild $BUILD_TYPE "$BUILD_FILE" -list 2>&1 | head -15
          
          # 构建设备版（不签名）
          xcodebuild \
            $BUILD_TYPE "$BUILD_FILE" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/DD \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO \
            build 2>&1 | tee ../build_log.txt | tail -50
          
          echo "=== Exit code: $? ==="
          echo "=== Products dir ==="
          find ../build/DD/Build -type d -name "*.app" 2>/dev/null | head -5
          find ../build/DD/Build -name "App.app" 2>/dev/null | head -3
          ls ../build/DD/Build/Products/ 2>/dev/null || echo "No Products"

      - name: Package IPA
        run: |
          APP_PATH=$(find ios/build/DD -name "App.app" -not -path "*dSYM*" 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ios -maxdepth 6 -name "App.app" -not -path "*Pods*" 2>/dev/null | head -1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No App.app found. Full search:"
            find . -name "*.app" -not -path "*Pods*" -not -path "*node_modules*" 2>/dev/null | head -10
            echo "=== Build log last 40 lines ==="
            tail -40 ios/build_log.txt 2>/dev/null
            exit 1
          fi
          
          echo "Packaging: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r Memoday.ipa Payload/
          ls -lh Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
          if-no-files-found: warn
