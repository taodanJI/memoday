name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Package IPA
        run: |
          cd ios-project
          
          # Build
          xcodebuild \
            -project Memoday.xcodeproj \
            -scheme Memoday \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            TARGETED_DEVICE_FAMILY="1" \
            clean build 2>&1 | tee ../build.log
          
          # Find .app
          APP_PATH=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            find build -maxdepth 5 -type d 2>/dev/null | head -30
            exit 1
          fi
          
          echo "Found: $APP_PATH"
          ls -la "$APP_PATH/" 2>/dev/null
          
          # Package
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Memoday.app
          zip -ry Memoday.ipa Payload
          mv Memoday.ipa ../
          rm -rf Payload
          
          echo "IPA created:"
          ls -lh ../Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
