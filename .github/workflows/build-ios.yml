name: Build iOS IPA for Sideloadly

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    name: Build iOS Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: |
          rm -rf node_modules
          npm install --ignore-scripts

      - name: Prepare www directory
        run: |
          mkdir -p www/icons www/js
          cp index.html style.css manifest.json sw.js icon.svg www/
          cp -r js/* www/js/
          [ -d icons ] && cp -r icons/* www/icons/ || true

      - name: Add iOS platform
        run: rm -rf ios && npx cap add ios

      - name: Sync web assets
        run: npx cap sync ios

      - name: List Xcode project files
        run: |
          echo "=== Files in ios/App/ ==="
          ls -la ios/App/
          echo ""
          echo "=== Looking for xcodeproj ==="
          find ios/App -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null
          echo ""
          echo "=== Does App.xcodeproj exist? ==="
          test -d ios/App/App.xcodeproj && echo "YES" || echo "NO"

      - name: Build with xcodeproj (no pods needed)
        run: cd ios/App && \
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/DD \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO \
            build 2>&1 | tee ../build_log.txt | tail -50

          echo "=== Exit code: $? ==="
          ls ../build/DD/Build/Products/ 2>/dev/null || echo "No Products dir"

      - name: Package IPA
        run: |
          # 找 App.app
          APP_PATH=$(find ios/build/DD -name "App.app" -not -path "*dSYM*" 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            # 备选搜索路径
            for p in \
              "ios/build/DD/Build/Products/Release-iphoneos/App.app" \
              "ios/build/DD/Build/Release-iphoneos/App.app"; do
              [ -d "$p" ] && { APP_PATH="$p"; break; }
            done
          fi

          if [ -z "$APP_PATH" ]; then
            echo "=== ERROR: No App.app found ==="
            echo "Build log (last 30 lines):"
            tail -30 ios/build_log.txt 2>/dev/null || true
            exit 1
          fi

          echo "Found app: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r Memoday.ipa Payload/
          ls -lh Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
          if-no-files-found: warn
