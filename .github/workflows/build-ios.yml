name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen 2>/dev/null || true

      - name: Generate Xcode project
        working-directory: ios-app
        run: |
          xcodegen generate 2>&1
          echo "--- Project files ---"
          find . -name "*.xcodeproj" -o -name "*.xcworkspace" | head -5
          echo "--- MemodayApp contents ---"
          ls -la MemodayApp/ 2>&1 || echo "MemodayApp dir not found"
          echo "--- Info.plist check ---"
          ls -la MemodayApp/Info.plist 2>&1 || echo "NO Info.plist"

      - name: Build
        working-directory: ios-app
        run: |
          set +e
          xcodebuild \
            -project Memoday.xcodeproj \
            -scheme Memoday \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            TARGETED_DEVICE_FAMILY="1" \
            clean build 2>&1 | tee build.log
          echo "=== EXIT CODE: $? ==="
          echo "--- Looking for .app ---"
          find build -name "*.app" -type d 2>&1 | head -10
          echo "--- Products dir ---"
          ls -laR build/Build/Products/ 2>&1 | head -30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios-app/build.log
          retention-days: 7

      - name: Package IPA
        run: |
          APP_PATH=$(find ios-app/build -name "Memoday.app" -type d 2>/dev/null | head -1)
          echo "APP_PATH=${APP_PATH}"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found! Trying alternate locations..."
            find ios-app/build -type d -name "*.app" 2>&1
            find ios-app/build -type f -name "Memoday" 2>&1
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Memoday.ipa Payload
          echo "IPA created OK"
          ls -lh Memoday.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Memoday-iOS-IPA
          path: Memoday.ipa
          retention-days: 30
          if-no-files-found: warn
