name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK (cmdline-tools)
      run: |
        mkdir -p ~/android-sdk/cmdline-tools
        cd ~/android-sdk/cmdline-tools
        curl -sL -o cmdtools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
        unzip -qo cmdtools.zip
        [ -d cmdline-tools ] && ! [ -e latest ] && mv cmdline-tools latest || true
        rm -f cmdtools.zip
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Setup Node.js & Install Dependencies
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install deps & Sync Capacitor to Android
      env:
        ANDROID_HOME: /home/runner/android-sdk
      run: |
        npm install --legacy-peer-deps
        npx cap sync android
        echo "=== Cap sync done ==="
        ls android/capacitor-cordova-android-plugins/build.gradle && echo "Plugins OK"
        ls node_modules/@capacitor/android/capacitor/build.gradle && echo "Capacitor Android OK"

    - name: Build release APK
      working-directory: android
      env:
        ANDROID_HOME: /home/runner/android-sdk
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build-log.txt || true
        tail -80 build-log.txt
        find app/build -name "*.apk" 2>/dev/null && echo "=== APK EXISTS ===" || echo "=== NO APK ==="

    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: Android-build-log
        path: android/build-log.txt
        retention-days: 30
      if: always()

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Memoday-Android-APK
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
