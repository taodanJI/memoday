name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: maxim-lobanov/setup-android-action@v1
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: Build APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Memoday-Android-APK
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
