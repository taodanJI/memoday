name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Copy standalone.html to Android assets
      run: |
        mkdir -p android/app/src/main/assets/public
        cp ios-project/MemodayApp/standalone.html android/app/src/main/assets/public/standalone.html

    - name: Setup Android SDK
      run: |
        # ubuntu-latest has sdkmanager pre-installed at /usr/local/lib/android/sdk/cmdline-tools/latest/bin/
        export ANDROID_HOME=/usr/local/lib/android/sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" > /dev/null 2>&1 || true

    - name: Build APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon 2>&1

    - name: Find and list APK
      run: |
        echo "=== Finding APK ==="
        find android -name "*.apk" -type f
        echo "=== Build outputs ==="
        ls -laR android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Memoday-Android-APK
        path: android/**/*.apk
        retention-days: 30
