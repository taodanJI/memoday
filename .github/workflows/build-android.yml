name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK & Build APK
      run: |
        echo "=== Download Android command-line tools ==="
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdtools.zip
        unzip -q cmdtools.zip
        mv cmdline-tools latest
        rm cmdtools.zip
        
        export ANDROID_HOME=$HOME/android-sdk
        export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
        
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        
        echo "=== Building APK (full output) ==="
        cd $GITHUB_WORKSPACE/android
        chmod +x gradlew
        export ANDROID_HOME=$HOME/android-sdk
        ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-output.txt
        
        echo ""
        echo "=== APK Search Results ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND"
        
        echo ""
        echo "=== Build output directory listing ==="
        ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs dir"
        ls -la app/build/apk/ 2>/dev/null || echo "No apk dir"

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gradle-build-log
        path: /tmp/gradle-output.txt

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Memoday-Android-APK
        path: android/**/*.apk
        retention-days: 30
