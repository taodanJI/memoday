name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK (cmdline-tools)
      run: |
        mkdir -p ~/android-sdk/cmdline-tools
        cd ~/android-sdk/cmdline-tools
        curl -sL -o cmdtools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
        unzip -qo cmdtools.zip 2>/dev/null || true
        [ -d cmdline-tools ] && ! [ -e latest ] && mv cmdline-tools latest || true
        rm -f cmdtools.zip
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        export PATH="$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH"
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Build release APK
      working-directory: android
      env:
        ANDROID_HOME: /home/runner/android-sdk
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Memoday-Android-APK
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
