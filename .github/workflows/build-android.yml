name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK using system SDK
      run: |
        # GitHub Actions ubuntu-latest has pre-installed Android SDK at /usr/local/lib/android/sdk
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"

        echo "=== Accept licenses ==="
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

        echo "=== Ensure required components ==="
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3 || true

        echo "=== Building APK ==="
        cd $GITHUB_WORKSPACE/android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

        echo "=== Find APK ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Memoday-Android-APK
        path: android/**/*.apk
        retention-days: 30
