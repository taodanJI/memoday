name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'ios-project/MemodayApp/standalone.html'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Copy standalone.html to Android assets
      run: |
        mkdir -p android/app/src/main/assets/public
        cp ios-project/MemodayApp/standalone.html android/app/src/main/assets/public/standalone.html

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept licenses
      run: yes | sdkmanager --licenses 2>/dev/null || true

    - name: Install SDK packages
      run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

    - name: Build APK
      working-directory: android
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon 2>&1 | tee /tmp/build.log

    - name: Find APK
      run: |
        echo "Searching for APK files..."
        find android -name "*.apk" -type f
        APK_PATH=$(find android/app/build/outputs -name "*.apk" -type f | head -1)
        echo "APK found at: $APK_PATH"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Memoday-Android-APK
        path: android/app/build/outputs/**/*.apk
        retention-days: 30
